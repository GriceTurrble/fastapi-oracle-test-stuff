default_install_hook_types:
  - pre-commit
  - post-checkout
  - post-merge
  - post-rewrite
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v6.0.0"
    hooks:
      - id: check-added-large-files
      - id: check-ast
      - id: check-case-conflict
      - id: check-json
        exclude: \.vscode
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
        exclude: mkdocs.ya?ml
      - id: debug-statements
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: trailing-whitespace

  - repo: https://github.com/rhysd/actionlint
    rev: "v1.7.12"
    hooks:
      - id: actionlint
        exclude: \.github/workflows/pypi-release.ya?ml$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.15.22"
    hooks:
      - id: ruff-check
        args: [--fix]
        types_or: [python, pyi, jupyter]

      - id: ruff-format
        types_or: [python, pyi, jupyter]

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: "0.11.29"
    hooks:
      - id: uv-lock
      - id: uv-sync
        args: ["--locked", "--all-groups"]

  - repo: local
    hooks:
      # Requires GITHUB_TOKEN env var to avoid API rate limits
      - id: pin-github-action
        name: pin-github-action-shas
        language: node
        entry: pin-github-action
        additional_dependencies: ["pin-github-action"]
        files: ^\.github/workflows/
        types_or: [yaml]

  - repo: https://github.com/hukkin/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-footnote
          - mdformat-frontmatter
          - mdformat-gfm
          - mdformat-gfm-alerts
          - mdformat-ruff

  - repo: https://github.com/rbubley/mirrors-prettier
    rev: "v3.9.5"
    hooks:
      - id: prettier
        types_or: [json, yaml]
